steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aurora-campaign:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aurora-campaign:latest'
      - '.'

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/aurora-campaign:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/aurora-campaign:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aurora-campaign'          # Cloud Run service name
      - '--image=gcr.io/$PROJECT_ID/aurora-campaign:$COMMIT_SHA'
      - '--region=us-central1'     # Change to your preferred region
      - '--platform=managed'
      - '--allow-unauthenticated'  # Public campaign page — no auth required
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'

images:
  - 'gcr.io/$PROJECT_ID/aurora-campaign:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/aurora-campaign:latest'

options:
  logging: CLOUD_LOGGING_ONLY
